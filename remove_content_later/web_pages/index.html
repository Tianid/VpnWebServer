<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        var SERVER_HOST = "{{HOST}}";
        var SERVER_PORT = "{{PORT}}";
        var VPN_STATUS = "{{STATUS}}";
    </script>
    <script src="/web_js/update_status.js">
        updateUI(VPN_STATUS);
    </script>
    <title>VPN Control</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        .status-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        .button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
        .button:disabled {
            background: gray;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div id="statusCircle" class="status-circle" style="background: red;"></div>
<p id="statusText">Отключён</p>
<button id="vpnButton" class="button">Подключиться</button>
</body>
</html>
