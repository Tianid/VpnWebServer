name: Release Build

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            apt_packages: gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libc6-dev-arm64-cross
            archive_suffix: aarch64-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross-linker
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Build
        run: cargo build --release --target=${{ matrix.target }}

      - name: Package release archive
        run: |
          ARCHIVE="haven-${{ github.ref_name }}-${{ matrix.archive_suffix }}"
          mkdir -p "${ARCHIVE}"
          cp target/${{ matrix.target }}/release/haven "${ARCHIVE}/"
          cp -r resources "${ARCHIVE}/"
          tar -czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## haven ${{ github.ref_name }}

            ### Targets included
            - `aarch64-unknown-linux-gnu` — Raspberry Pi 5 (Pi OS / Debian, glibc)

            ### Installation
            1. Download and extract the `.tar.gz` archive.
            2. Place the extracted folder on the Raspberry Pi.
            3. Run: `./haven -a 0.0.0.0 -p 9000`

            The `resources/` directory must remain alongside the binary.
          draft: false
          prerelease: false
          files: "*.tar.gz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
