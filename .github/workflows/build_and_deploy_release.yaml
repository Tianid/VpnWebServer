name: Build and deploy release Aarch64

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Set up environment
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build for Aarch64
        run: |
          RUSTFLAGS="-C linker=aarch64-linux-gnu-gcc" cargo build --release --target=aarch64-unknown-linux-gnu

      - name: Prepare Artifact Directory
        run: |
          mkdir -p release_package
          cp target/aarch64-unknown-linux-gnu/release/VpnWebServer release_package/
          cp -r resources release_package/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "Release ${{ github.ref_name }}"
          body: "Aarch64 realease build"
          draft: false
          prerelease: false
          files: release_package/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
