<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VPN Control Panel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: #fff;
      border-bottom: 1px solid #ddd;
    }

    .top-bar button {
      padding: 6px 14px;
      font-size: 14px;
      border: 1px solid #007bff;
      border-radius: 6px;
      background: #fff;
      color: #007bff;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .top-bar button:hover {
      background: #007bff;
      color: #fff;
    }

    #errorBanner {
      display: none;
      background: #dc3545;
      color: #fff;
      text-align: center;
      padding: 8px 16px;
      font-size: 13px;
    }

    .container {
      flex: 1;
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
    }

    .status-indicator {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 4px solid transparent;
      transition: background-color 0.3s, border-color 0.3s;
    }

    .status-connected     { background: #28a745; border-color: #28a745; }
    .status-disconnected  { background: #dc3545; border-color: #dc3545; }
    .status-connecting    { background: #fd7e14; border-color: #fd7e14; animation: pulse 1s ease-in-out infinite; }
    .status-disconnecting { background: #fd7e14; border-color: #fd7e14; animation: pulse 1s ease-in-out infinite; }
    .status-reconnecting  { background: #ffc107; border-color: #ffc107; animation: pulse 1s ease-in-out infinite; }
    .status-unknown       { background: #6c757d; border: 4px dashed #999; }

    @keyframes pulse {
      0%   { opacity: 1; }
      50%  { opacity: 0.35; }
      100% { opacity: 1; }
    }

    .status-text {
      font-size: 22px;
      font-weight: bold;
      color: #333;
      text-align: center;
    }

    .location-label {
      text-align: center;
      min-height: 20px;
      line-height: 1.4;
    }
    .loc-label-flag    { font-size: 20px; }
    .loc-label-country { font-size: 16px; color: #333; font-weight: 500; }
    .loc-label-city    { font-size: 14px; color: #777; }

    #locationPanel {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    #locationPanel summary {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      color: #555;
      user-select: none;
      list-style: none;
      border-bottom: 1px solid #ddd;
    }

    #locationPanel summary::-webkit-details-marker { display: none; }

    #locationPanel summary::before {
      content: '\25B6';
      font-size: 11px;
      transition: transform 0.2s;
      display: inline-block;
    }

    #locationPanel[open] summary::before { transform: rotate(90deg); }

    #locationSearch {
      width: 100%;
      padding: 10px 14px;
      font-size: 14px;
      border: none;
      border-bottom: 1px solid #ddd;
      outline: none;
    }

    .location-table-wrap {
      max-height: 200px;
      overflow-y: auto;
    }

    #locationTable {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    #locationTable tbody tr {
      cursor: pointer;
      transition: background 0.15s;
    }

    #locationTable tbody tr:hover    { background: #f0f4ff; }
    #locationTable tbody tr.selected { background: #d0e4ff; }

    #locationTable td {
      padding: 8px 10px;
      border-bottom: 1px solid #eee;
    }

    #locationTable td:first-child { vertical-align: middle; }
    #locationTable td:last-child  { text-align: right; white-space: nowrap; vertical-align: middle; }

    .loc-info    { display: flex; align-items: flex-start; gap: 6px; }
    .loc-flag    { font-size: 18px; line-height: 1.3; flex-shrink: 0; }
    .loc-country { font-size: 14px; color: #333; line-height: 1.3; }
    .loc-city    { font-size: 12px; color: #777; margin-top: 2px; }
    .loc-check   { color: #28a745; font-weight: bold; }

    #locationTable tbody tr.connected       { background: #d4edda; }
    #locationTable tbody tr.connected:hover { background: #c3e6cb; }

    .location-empty {
      padding: 12px;
      text-align: center;
      color: #999;
      font-size: 13px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    #toggleBtn {
      padding: 12px 36px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
      min-width: 160px;
    }

    #toggleBtn:hover:enabled  { background: #0056b3; }
    #toggleBtn:disabled       { background: #aaa; cursor: not-allowed; }

    #toggleBtn.danger             { background: #dc3545; }
    #toggleBtn.danger:hover:enabled { background: #b02a37; }

    .secondary-buttons {
      display: flex;
      gap: 10px;
    }

    .secondary-buttons button {
      padding: 9px 18px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      background: #6c757d;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }

    .secondary-buttons button:hover:enabled { background: #545b62; }
    .secondary-buttons button:disabled      { background: #bbb; cursor: not-allowed; }

    #logPanel {
      width: 100%;
      border-top: 1px solid #ddd;
      background: #fff;
    }

    #logPanel summary {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      color: #555;
      user-select: none;
      list-style: none;
    }

    #logPanel summary::-webkit-details-marker { display: none; }

    #logPanel summary::before {
      content: '▶';
      font-size: 11px;
      transition: transform 0.2s;
      display: inline-block;
    }

    #logPanel[open] summary::before { transform: rotate(90deg); }

    #logPanel summary > span { flex: 1; }

    #logLevelSelect {
      font-size: 13px;
      padding: 3px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }

    #logPanel summary > button {
      font-size: 13px;
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      background: #e9ecef;
      color: #333;
      cursor: pointer;
      transition: background 0.15s;
    }

    #logPanel summary > button:hover { background: #dee2e6; }

    #logOutput {
      max-height: 200px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.8rem;
      background: #1a1a1a;
      color: #d4d4d4;
      padding: 6px 8px;
    }

    #logOutput .log-warn  { color: #fd7e14; }
    #logOutput .log-error { color: #dc3545; }
    #logOutput .log-debug { color: #6ea8fe; }
    #logOutput .log-trace { color: #888;    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal-card {
      background: #fff;
      border-radius: 10px;
      padding: 24px 28px;
      max-width: 320px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-title {
      font-size: 17px;
      font-weight: bold;
      color: #333;
    }

    .modal-message {
      font-size: 14px;
      color: #555;
      line-height: 1.5;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .modal-buttons button {
      padding: 8px 18px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #modalCancelBtn          { background: #e9ecef; color: #333; }
    #modalCancelBtn:hover    { background: #dee2e6; }
    #modalConfirmBtn         { background: #dc3545; color: #fff; }
    #modalConfirmBtn:hover   { background: #b02a37; }

    @media (max-width: 480px) {
      .status-indicator { width: 70px; height: 70px; }
      .status-text      { font-size: 18px; }
      #toggleBtn        { width: 100%; }
      .secondary-buttons { flex-direction: column; width: 100%; }
      .secondary-buttons button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <button id="langToggle" onclick="toggleLanguage()">RU</button>
    <button id="refreshBtn" onclick="sendRefresh()">Refresh</button>
  </div>

  <div id="errorBanner"></div>

  <div class="container">
    <div id="statusIndicator" class="status-indicator status-unknown"></div>
    <div id="locationLabel" class="location-label"></div>
    <div id="statusText" class="status-text">—</div>

    <div class="buttons">
      <button id="toggleBtn" onclick="onToggleClick()" disabled>…</button>
      <div class="secondary-buttons">
        <button id="wifiBtn" onclick="confirmWifi()">Reconnect WiFi</button>
        <button id="restartBtn" onclick="confirmRestart()">Restart</button>
      </div>
    </div>

    <details id="locationPanel">
      <summary><span data-i18n="location_panel_title">Locations</span></summary>
      <input id="locationSearch" type="text"
             placeholder="Search locations..." oninput="filterLocations()" />
      <div class="location-table-wrap">
        <table id="locationTable">
          <tbody id="locationBody">
            <tr><td colspan="2" class="location-empty">Loading locations...</td></tr>
          </tbody>
        </table>
      </div>
    </details>
  </div>

  <details id="logPanel">
    <summary>
      <span data-i18n="log_panel_title">Server Log</span>
      <select id="logLevelSelect" onchange="setLogLevel(this.value)">
        <option value="trace">TRACE</option>
        <option value="debug">DEBUG</option>
        <option value="info" selected>INFO</option>
        <option value="warn">WARN</option>
        <option value="error">ERROR</option>
        <option value="off">OFF</option>
      </select>
      <button onclick="clearLog()" data-i18n="log_clear">&#128465; Clear</button>
    </summary>
    <div id="logOutput"></div>
  </details>

  <div id="confirmModal" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div id="modalTitle" class="modal-title"></div>
      <div id="modalMessage" class="modal-message"></div>
      <div class="modal-buttons">
        <button id="modalCancelBtn"></button>
        <button id="modalConfirmBtn"></button>
      </div>
    </div>
  </div>

  <script src="/resources/web_resources/page_scripts/client.js"></script>
</body>
</html>
