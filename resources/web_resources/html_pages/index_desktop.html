<!DOCTYPE html>
<html lang="en">
<head>
  <!-- haven:layout=desktop -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>haven</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #F4F4F5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 24px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .top-bar-title {
      font-size: 16px;
      font-weight: bold;
      color: #333;
      letter-spacing: 0.02em;
    }

    .top-bar button {
      padding: 6px 14px;
      font-size: 14px;
      border: 1px solid #4078F2;
      border-radius: 6px;
      background: #fff;
      color: #4078F2;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .top-bar button:hover { background: #4078F2; color: #fff; }

    #errorBanner {
      display: none;
      background: #E45649;
      color: #fff;
      text-align: center;
      padding: 8px 24px;
      font-size: 13px;
      flex-shrink: 0;
    }

    .main-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      padding: 24px;
      align-items: start;
      min-height: 0;
    }

    /* ── Left column ─────────────────────────────────────────── */

    .left-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .status-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .status-indicator {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid transparent;
      transition: background-color 0.3s, border-color 0.3s;
    }

    .status-connected     { background: #50A14F; border-color: #50A14F; }
    .status-disconnected  { background: #E45649; border-color: #E45649; }
    .status-connecting    { background: #C18401; border-color: #C18401; animation: pulse 1s ease-in-out infinite; }
    .status-disconnecting { background: #C18401; border-color: #C18401; animation: pulse 1s ease-in-out infinite; }
    .status-reconnecting  { background: #D5980A; border-color: #D5980A; animation: pulse 1s ease-in-out infinite; }
    .status-unknown       { background: #9DA3AF; border: 4px dashed #999; }

    @keyframes pulse {
      0%   { opacity: 1; }
      50%  { opacity: 0.35; }
      100% { opacity: 1; }
    }

    .status-text {
      font-size: 22px;
      font-weight: bold;
      color: #333;
      text-align: center;
    }

    .location-label {
      text-align: center;
      min-height: 20px;
      line-height: 1.4;
    }

    .loc-label-flag    { font-size: 20px; }
    .loc-label-country { font-size: 15px; color: #333; font-weight: 500; }
    .loc-label-city    { font-size: 13px; color: #777; }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 20px;
    }

    #toggleBtn {
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      background: #4078F2;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }

    #toggleBtn:hover:enabled   { background: #3063D5; }
    #toggleBtn:disabled        { background: #B8BAC0; cursor: not-allowed; }
    #toggleBtn.danger          { background: #E45649; }
    #toggleBtn.danger:hover:enabled { background: #C73E32; }

    .secondary-buttons {
      display: flex;
      gap: 10px;
    }

    .secondary-buttons button {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      background: #9DA3AF;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }

    .secondary-buttons button:hover:enabled { background: #828896; }
    .secondary-buttons button:disabled      { background: #C4C6CC; cursor: not-allowed; }

    /* ── Right column ────────────────────────────────────────── */

    .right-col {
      display: flex;
      flex-direction: column;
    }

    .location-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .location-card-header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: bold;
      color: #555;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }

    #locationSearch {
      width: 100%;
      padding: 10px 16px;
      font-size: 14px;
      border: none;
      border-bottom: 1px solid #ddd;
      outline: none;
      flex-shrink: 0;
    }

    .location-table-wrap {
      overflow-y: auto;
      max-height: calc(100vh - 260px);
      min-height: 200px;
    }

    #locationTable {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    #locationTable tbody tr {
      cursor: pointer;
      transition: background 0.15s;
    }

    #locationTable tbody tr:hover    { background: #f0f4ff; }
    #locationTable tbody tr.selected { background: #d0e4ff; }

    #locationTable td {
      padding: 9px 12px;
      border-bottom: 1px solid #eee;
    }

    #locationTable td:first-child { vertical-align: middle; }
    #locationTable td:last-child  { text-align: right; white-space: nowrap; vertical-align: middle; }

    .loc-info    { display: flex; align-items: flex-start; gap: 6px; }
    .loc-flag    { font-size: 18px; line-height: 1.3; flex-shrink: 0; }
    .loc-country { font-size: 14px; color: #333; line-height: 1.3; }
    .loc-city    { font-size: 12px; color: #777; margin-top: 2px; }
    .loc-check   { color: #50A14F; font-weight: bold; }

    #locationTable tbody tr.connected       { background: #DFF0DE; }
    #locationTable tbody tr.connected:hover { background: #CBE9CA; }

    .location-empty {
      padding: 14px;
      text-align: center;
      color: #999;
      font-size: 13px;
    }

    /* ── Log panel ───────────────────────────────────────────── */

    #logPanel {
      flex-shrink: 0;
      border-top: 1px solid #ddd;
      background: #fff;
    }

    #logPanel summary {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      color: #555;
      user-select: none;
      list-style: none;
    }

    #logPanel summary::-webkit-details-marker { display: none; }

    #logPanel summary::before {
      content: '▶';
      font-size: 11px;
      transition: transform 0.2s;
      display: inline-block;
    }

    #logPanel[open] summary::before { transform: rotate(90deg); }

    #logPanel summary > span { flex: 1; }

    #logLevelSelect {
      font-size: 13px;
      padding: 3px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }

    #logPanel summary > button {
      font-size: 13px;
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      background: #e9ecef;
      color: #333;
      cursor: pointer;
      transition: background 0.15s;
    }

    #logPanel summary > button:hover  { background: #dee2e6; }
    #logPanel summary > button.active  { background: #4078F2; color: #fff; }
    #logPanel summary > button.active:hover { background: #3063D5; }

    #logOutput {
      max-height: 260px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.8rem;
      background: #1a1a1a;
      color: #d4d4d4;
      padding: 6px 10px;
    }

    #logOutput .log-warn  { color: #C18401; }
    #logOutput .log-error { color: #E45649; }
    #logOutput .log-debug { color: #6ea8fe; }
    #logOutput .log-trace { color: #888; }

    /* ── System info panel ────────────────────────────────── */

    #sysInfoPanel {
      flex-shrink: 0;
      border-top: 1px solid #ddd;
      background: #fff;
    }

    #sysInfoPanel summary {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      color: #555;
      user-select: none;
      list-style: none;
    }

    #sysInfoPanel summary::-webkit-details-marker { display: none; }

    #sysInfoPanel summary::before {
      content: '\25B6';
      font-size: 11px;
      transition: transform 0.2s;
      display: inline-block;
    }

    #sysInfoPanel[open] summary::before { transform: rotate(90deg); }

    #sysInfoPanel summary > span { flex: 1; }

    #sysInfoPanel summary > button {
      font-size: 13px;
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      background: #e9ecef;
      color: #333;
      cursor: pointer;
      transition: background 0.15s;
    }

    #sysInfoPanel summary > button:hover { background: #dee2e6; }

    .sysinfo-content {
      padding: 10px 24px 14px;
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }

    .sysinfo-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sysinfo-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .sysinfo-value {
      font-size: 15px;
      font-weight: 500;
      color: #333;
      font-family: monospace;
    }

    /* ── Modal ───────────────────────────────────────────────── */

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal-card {
      background: #fff;
      border-radius: 10px;
      padding: 28px 36px;
      max-width: 440px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-title   { font-size: 18px; font-weight: bold; color: #333; }
    .modal-message { font-size: 14px; color: #555; line-height: 1.5; }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .modal-buttons button {
      padding: 9px 22px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #modalCancelBtn        { background: #e9ecef; color: #333; }
    #modalCancelBtn:hover  { background: #dee2e6; }
    #modalConfirmBtn       { background: #E45649; color: #fff; }
    #modalConfirmBtn:hover { background: #C73E32; }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="top-bar-title">haven</span>
      <button id="langToggle" onclick="toggleLanguage()">RU</button>
    </div>
    <button id="refreshBtn" onclick="sendRefresh()">Refresh</button>
  </div>

  <div id="errorBanner"></div>

  <div class="main-grid">
    <div class="left-col">
      <div class="status-card">
        <div id="statusIndicator" class="status-indicator status-unknown"></div>
        <div id="locationLabel" class="location-label"></div>
        <div id="statusText" class="status-text">—</div>
      </div>

      <div class="buttons">
        <button id="toggleBtn" onclick="onToggleClick()" disabled>…</button>
        <div class="secondary-buttons">
          <button id="wifiBtn" onclick="confirmWifi()">Reconnect WiFi</button>
          <button id="restartBtn" onclick="confirmRestart()">Restart</button>
        </div>
      </div>
    </div>

    <div class="right-col">
      <div class="location-card">
        <div class="location-card-header">
          <span data-i18n="location_panel_title">Locations</span>
        </div>
        <input id="locationSearch" type="text"
               placeholder="Search locations..." oninput="filterLocations()" />
        <div class="location-table-wrap">
          <table id="locationTable">
            <tbody id="locationBody">
              <tr><td colspan="2" class="location-empty">Loading locations...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <details id="sysInfoPanel" ontoggle="sysInfoPanelOpen()">
    <summary>
      <span data-i18n="sysinfo_panel_title">System Info</span>
      <button data-i18n="sysinfo_refresh" onclick="sendGetSystemInfo()">Refresh</button>
    </summary>
    <div class="sysinfo-content">
      <div class="sysinfo-item">
        <span class="sysinfo-label" data-i18n="sysinfo_cpu">CPU Temp</span>
        <span class="sysinfo-value" id="sysInfoTemp">&mdash;</span>
      </div>
      <div class="sysinfo-item">
        <span class="sysinfo-label" data-i18n="sysinfo_uptime">Uptime</span>
        <span class="sysinfo-value" id="sysInfoUptime">&mdash;</span>
      </div>
      <div class="sysinfo-item">
        <span class="sysinfo-label" data-i18n="sysinfo_mem_free">Free Memory</span>
        <span class="sysinfo-value" id="sysInfoMem">&mdash;</span>
      </div>
    </div>
  </details>

  <details id="logPanel">
    <summary>
      <span data-i18n="log_panel_title">Server Log</span>
      <select id="logLevelSelect" onchange="setLogLevel(this.value)">
        <option value="trace">TRACE</option>
        <option value="debug">DEBUG</option>
        <option value="info" selected>INFO</option>
        <option value="warn">WARN</option>
        <option value="error">ERROR</option>
        <option value="off">OFF</option>
      </select>
      <button id="logPinBtn" class="active" onclick="toggleLogPin()" title="Auto-scroll">&#128204;</button>
      <button onclick="clearLog()" data-i18n="log_clear">&#128465; Clear</button>
    </summary>
    <div id="logOutput"></div>
  </details>

  <div id="confirmModal" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div id="modalTitle" class="modal-title"></div>
      <div id="modalMessage" class="modal-message"></div>
      <div class="modal-buttons">
        <button id="modalCancelBtn"></button>
        <button id="modalConfirmBtn"></button>
      </div>
    </div>
  </div>

  <script src="/resources/web_resources/page_scripts/client.js"></script>
  <script src="/resources/web_resources/page_scripts/client_desktop.js"></script>
</body>
</html>
