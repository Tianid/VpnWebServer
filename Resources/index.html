<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Control</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        .status-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        .button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
        .button:disabled {
            background: gray;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div id="statusCircle" class="status-circle" style="background: red;"></div>
<p id="statusText">Отключён</p>
<button id="vpnButton" class="button" onclick="toggleVpn()">Подключиться</button>

<script>
    let currentStatus = "Disconnected"; // Глобальная переменная для хранения статуса

    function updateStatus() {
        fetch('/status')
            .then(res => res.text())
            .then(status => {
                currentStatus = status; // Сохраняем статус для `toggleVpn()`
                document.getElementById("statusText").innerText = status;
                console.log(`!!!! ${status}`)
                console.log(`!!!! END`)

                let circle = document.getElementById("statusCircle");
                let button = document.getElementById("vpnButton");

                if (status === "Disconnected") {
                    circle.style.background = "red";
                    button.innerText = "Подключиться";
                    button.disabled = false;
                } else if (status === "Connected") {
                    circle.style.background = "green";
                    button.innerText = "Отключиться";
                    button.disabled = false;
                } else { // Подключается, Отключается, Переподключается
                    circle.style.background = "orange";
                    button.innerText = "Отключиться"; // Действие всегда ОТКЛЮЧЕНИЕ
                    button.disabled = true; // Пока процесс идёт, кнопка блокируется
                }
            })
            .catch(error => console.error("Ошибка получения статуса:", error));
    }

    /*function toggleVpn() {
        if (currentStatus === "Disconnected") {
            fetch('/start', { method: "POST" }) // Новый маршрут для подключения
                .then(updateStatus)
                .catch(error => console.error("Ошибка при подключении:", error));
        } else {
            fetch('/stop', { method: "POST" }) // Новый маршрут для отключения
                .then(updateStatus)
                .catch(error => console.error("Ошибка при отключении:", error));
        }
    } */

    function toggleVpn() {
        let endpoint = currentStatus === "Disconnected" ? "/start" : "/stop";
        fetch(endpoint, { method: "POST" })
            .then(response => response.text()) // <-- Добавили .text()!
            .then(updateStatus)
            .catch(error => console.error("Ошибка при отправке команды:", error));
    }

    // setInterval(updateStatus, 2000); // Обновляем статус каждые 2 секунды
</script>
</body>
</html>
